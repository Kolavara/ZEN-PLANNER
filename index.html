<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Zen Planner — The Ultimate 2026 Digital Planner. 525 pages of clean, minimalist design with fully clickable hyperlinks, habit trackers, and productivity cheat sheets.">
    <title>Zen Planner | 2026 Digital Planner by JDRAO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=11">
</head>
<body>
    <!-- Authentication Overlay -->
    <div id="auth-overlay" class="auth-overlay visible">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-logo">🌿</div>
                <h2>Zen Planner</h2>
                <p class="auth-tagline">Your calm, intentional workspace</p>
            </div>
            <h3 id="auth-title">Welcome Back</h3>
            <form id="auth-form" autocomplete="on">
                <div class="auth-field">
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" name="email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="auth-field">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" name="password" required placeholder="••••••••" minlength="6" autocomplete="current-password">
                </div>
                <p id="auth-error" class="auth-error"></p>
                <p id="auth-success" class="auth-success"></p>
                <button type="submit" id="auth-submit" class="auth-btn">Sign In</button>
            </form>
            <p class="auth-footer">
                <a href="#" id="auth-toggle">Don't have an account? Sign up</a>
            </p>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app">
        <nav id="month-tabs" aria-label="Month Navigation"></nav>
        <header id="top-nav">
            <div id="breadcrumbs" aria-label="Breadcrumb Navigation"></div>
            <div class="nav-right">
                <div id="user-info" class="user-info">
                    <span id="user-email" class="user-email"></span>
                    <button id="btn-logout" class="btn-icon" title="Sign Out" aria-label="Sign Out">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </button>
                </div>
                <div class="nav-controls">
                    <button id="btn-prev" title="Previous Page" aria-label="Previous Page">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <button id="btn-home" title="Cover Page" aria-label="Cover Page">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </button>
                    <button id="btn-next" title="Next Page" aria-label="Next Page">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <div class="music-player-container">
                        <button id="btn-music" title="Toggle Music" aria-label="Toggle Music">
                            <svg id="icon-music-on" style="display:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                            <svg id="icon-music-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                        </button>
                        <div class="music-dropdown" id="music-dropdown">
                            <div class="music-dropdown-header">Audio Queue</div>
                            <ul id="playlist-container">
                                <!-- Dynamic tracks go here -->
                            </ul>
                            <div class="music-dropdown-footer">
                                <label for="audio-upload" class="btn-add-audio">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                    Add Track
                                </label>
                                <input type="file" id="audio-upload" accept="audio/*" style="display:none;" multiple>
                            </div>
                        </div>
                    </div>
                    <button id="btn-theme" title="Toggle B&W Mode" aria-label="Toggle B&W Mode">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/></svg>
                    </button>
                    <button id="btn-print" title="Print / Export PDF" aria-label="Export PDF">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    </button>
                    <button id="btn-ai" title="AI Goal Breakdown" aria-label="AI Assistant">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                    </button>
                </div>
            </div>
        </header>
        <main id="page-content"></main>
        <footer id="page-footer">
            <span id="page-counter">1 / 525</span>
        </footer>
    </div>

    <!-- AI Goal Breakdown Modal -->
    <div id="ai-modal" class="ai-modal hidden">
        <div class="ai-modal-content">
            <button id="ai-close-btn" class="ai-close-btn">&times;</button>
            <div class="ai-header">AI Assistant</div>
            <div class="ai-input-group">
                <input type="text" id="ai-goal-input" placeholder="Enter a large goal to break down..." autocomplete="off">
                <button id="ai-submit-btn">Breakdown</button>
            </div>
            <div id="ai-results-container" class="ai-results"></div>
        </div>
    </div>

    <audio id="bg-audio"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=9"></script>
    <script src="supabase.js?v=9"></script>
    <script src="auth.js?v=9"></script>
    <script src="app.js?v=16"></script>
</body>
</html>
